apiVersion: v1
kind: Namespace
metadata:
  name: "harness-delegate-build"

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: "kubernetes-delegate-build-ng"
  namespace: "harness-delegate-build"

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "kubernetes-delegate-build-ng"
subjects:
  - kind: ServiceAccount
    name: "kubernetes-delegate-build-ng"
    namespace: "harness-delegate-build"
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: v1
kind: Secret
metadata:
  name: "kubernetes-delegate-build-ng"
  namespace: "harness-delegate-build"
type: Opaque
data:
  HARNESS_DELEGATE_TOKEN: "Mjk2MzViMDJiMTM3NmUxZGYyNmIwNDY2ZjcxZGI5YzM="

---

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    harness.io/name: "kubernetes-delegate-build-ng"
  name: "kubernetes-delegate-build-ng"
  namespace: "harness-delegate-build"
spec:
  replicas: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      harness.io/name: "kubernetes-delegate-build-ng"
  template:
    metadata:
      labels:
        harness.io/name: "kubernetes-delegate-build-ng"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: "kubernetes-delegate-build-ng"
      terminationGracePeriodSeconds: 600
      restartPolicy: Always
      containers:
      - image: "us-docker.pkg.dev/gar-prod-setup/harness-public/harness/delegate:3.3.1"
        imagePullPolicy: Always
        name: delegate
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 0
        resources:
          limits:
            memory: "256Mi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 5
        envFrom:
        - secretRef:
            name: "kubernetes-delegate-build-ng"
        env:
        - name: HARNESS_ACCOUNT_ID
          value: "ZTcxOGZkZDgtMWFjOC00NT"
        - name: MANAGER_HOST_AND_PORT
          value: "https://harness-cxe.harness.io"
        - name: HARNESS_DELEGATE_NAME
          value: "kubernetes-delegate-build-ng"
        - name: HARNESS_DELEGATE_TAGS
          value: "container-build"
        # INIT_SCRIPT hook for later: install extra tools (git, docker cli, etc.) at delegate startup.
        # Leave empty for now; we'll confirm the exact 3.0 mechanism and fill this in before wiring pipelines.
        - name: INIT_SCRIPT
          value: ""
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_SERVICE_ACCOUNT_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName

---

apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
   name: "kubernetes-delegate-build-ng"
   namespace: "harness-delegate-build"
   labels:
       harness.io/name: "kubernetes-delegate-build-ng"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "kubernetes-delegate-build-ng"
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 99
