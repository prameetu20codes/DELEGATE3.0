# Harness CI pipeline: DinD background step + Run step that builds & pushes to Docker Hub.
#
# This version CLONES the git repo (which contains many Dockerfiles), runs a discovery
# step to locate the right one, then builds & pushes it. Self-hosted VM infrastructure
# is used because DinD requires a privileged container (Harness Cloud disallows it).
#
# Replace the <PLACEHOLDERS> before importing:
#   <ORG>          - Harness org identifier (e.g. default)
#   <PROJECT>      - Harness project identifier
#   <POOL_NAME>    - matches the `name:` in pool.yml (e.g. dind-pool)
#   <GIT_CONNECTOR>- Harness Git connector identifier for github.com/prameetu20codes/DELEGATE3.0
#
# Which Dockerfile gets built is controlled by TARGET_DIR (default: dind-demo).
pipeline:
  identifier: dind_build_push
  name: DinD Build and Push
  orgIdentifier: <ORG>
  projectIdentifier: <PROJECT>
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: <GIT_CONNECTOR>
        repoName: DELEGATE3.0
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        identifier: build_and_push
        name: Build and Push
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: VM
            spec:
              type: Pool
              spec:
                poolName: <POOL_NAME>
                os: Linux
          sharedPaths:
            - /var/run
          execution:
            steps:
              - step:
                  identifier: dind
                  name: DinD Background
                  type: Background
                  spec:
                    image: docker:dind
                    shell: Sh
                    entrypoint:
                      - dockerd-entrypoint.sh
                    privileged: true
                    envVariables:
                      DOCKER_TLS_CERTDIR: ""
              - step:
                  identifier: build_push
                  name: Build and Push Image
                  type: Run
                  spec:
                    image: docker:latest
                    shell: Sh
                    envVariables:
                      TARGET_DIR: dind-demo
                      DOCKER_HOST: tcp://localhost:2375
                      DOCKER_PASSWORD: <+secrets.getValue("docker_pat")>
                    command: |
                      # --- locate the Dockerfile to build (repo has many) ---
                      ALL=$(find . -type f \
                              \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' -o -iname '*.dockerfile' \) \
                              -not -path './.git/*' | sed 's|^\./||' | sort)
                      echo "Dockerfiles found:"; echo "$ALL" | sed 's/^/   - /'
                      DOCKERFILE=$(echo "$ALL" | grep "^${TARGET_DIR%/}/" | head -n 1)
                      if [ -z "$DOCKERFILE" ]; then
                        echo "ERROR: no Dockerfile under TARGET_DIR=$TARGET_DIR" >&2; exit 1
                      fi
                      CONTEXT=$(dirname "$DOCKERFILE")
                      echo "Selected: $DOCKERFILE (context: $CONTEXT)"

                      # --- wait for the DinD daemon ---
                      until docker info >/dev/null 2>&1; do echo "waiting for docker..."; sleep 1; done

                      # --- login, build, push ---
                      echo "$DOCKER_PASSWORD" | docker login -u prameet2025 --password-stdin
                      docker build --build-arg BUILD_TIME="$(date -u +%FT%TZ)" \
                        -f "$DOCKERFILE" \
                        -t prameet2025/dind-test:<+pipeline.sequenceId> \
                        -t prameet2025/dind-test:latest \
                        "$CONTEXT"
                      docker push prameet2025/dind-test:<+pipeline.sequenceId>
                      docker push prameet2025/dind-test:latest
        failureStrategies:
          - onFailure:
              errors: [AllErrors]
              action:
                type: MarkAsFailure
