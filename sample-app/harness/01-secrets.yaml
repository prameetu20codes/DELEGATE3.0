# Two project-scoped secrets. Replace the inline values before creating, or
# create them in the Harness UI (Project Settings > Secrets) and just keep the
# identifiers below. Never commit real secret values to git.
#
# NOTE: This file holds two documents. When creating via MCP, create each
# `secret:` block separately.
---
secret:
  identifier: dockerhub_pat
  name: Docker Hub PAT
  description: Docker Hub access token used to push the built image and pull it during deploy
  type: SecretText
  spec:
    secretManagerIdentifier: harnessSecretManager
    valueType: Inline
    value: <REPLACE_WITH_DOCKERHUB_TOKEN>
---
secret:
  identifier: github_pat
  name: GitHub PAT
  description: GitHub personal access token used to clone code and read manifests
  type: SecretText
  spec:
    secretManagerIdentifier: harnessSecretManager
    valueType: Inline
    value: <REPLACE_WITH_GITHUB_TOKEN>
