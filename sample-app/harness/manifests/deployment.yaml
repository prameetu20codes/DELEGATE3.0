{{- if .Values.dockercfg}}
# Image pull secret materialized from the Docker Hub connector credentials.
# Only rendered when .Values.dockercfg is set (i.e. the artifact connector has
# credentials). Harmless for a public image; required for a private one.
apiVersion: v1
kind: Secret
metadata:
  name: {{.Values.name}}-dockercfg
  annotations:
    harness.io/skip-versioning: "true"
data:
  .dockercfg: {{.Values.dockercfg}}
type: kubernetes.io/dockercfg
---
{{- end}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.name}}-deployment
  labels:
    app: {{.Values.name}}
spec:
  replicas: {{int .Values.replicas}}
  selector:
    matchLabels:
      app: {{.Values.name}}
  template:
    metadata:
      labels:
        app: {{.Values.name}}
    spec:
      {{- if .Values.dockercfg}}
      imagePullSecrets:
      - name: {{.Values.name}}-dockercfg
      {{- end}}
      containers:
      # Primary container: the image built and pushed by the CI stage.
      - name: web
        image: {{.Values.image}}
        ports:
        - containerPort: {{.Values.appPort}}
        # UNBLOCK: app config is inlined from values instead of envFrom the
        # sample-app-config ConfigMap. The only ConfigMap this Deployment now
        # references is sample-app-proxy-config (mounted as a volume below).
        # Revisit the sample-app-config / envFrom issue separately.
        env:
        - name: PORT
          value: "{{.Values.appPort}}"
        - name: RELEASE_NAME
          value: {{.Values.releaseName}}
        - name: APP_MESSAGE
          value: {{.Values.config.APP_MESSAGE | quote}}
        - name: GREETING_COLOR
          value: {{.Values.config.GREETING_COLOR | quote}}
        - name: LOG_LEVEL
          value: {{.Values.config.LOG_LEVEL | quote}}
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{.Values.appPort}}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      # Sidecar container: public nginx image acting as a reverse proxy.
      - name: proxy
        image: {{.Values.sidecarImage}}
        ports:
        - containerPort: {{.Values.servicePort}}
        volumeMounts:
        - name: proxy-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: proxy-config
        configMap:
          name: {{.Values.name}}-proxy-config
