# Second, standalone Secret used purely to test whether Harness applies
# multiple resources of the same kind. Fully hardcoded (no values, no
# templating other than the name) so it must always render.
apiVersion: v1
kind: Secret
metadata:
  name: {{.Values.name}}-test-secret
type: Opaque
stringData:
  MARKER: "second-secret-check"
  NOTE: "if you can see this secret alongside sample-app-dockercfg, multiple same-kind resources work"
