# App ConfigMap (env vars for the web container).
# Data is inlined here (not read from .Values.config) so this file always
# renders, regardless of what the Service's values.yaml contains. If you later
# want these values driven by values.yaml, confirm the effective values file
# has a top-level `config:` map, then switch the data block back to:
#   {{- range $key, $value := .Values.config}} ...
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.Values.name}}-config
  # skip-versioning keeps the literal name so the Deployment's envFrom resolves
  # (Harness resource versioning does NOT rewrite envFrom.configMapRef).
  annotations:
    harness.io/skip-versioning: "true"
data:
  APP_MESSAGE: "Hello from Arnold L3.0"
  GREETING_COLOR: "#0263f4"
  LOG_LEVEL: "info"
