# App ConfigMap (env vars for the web container).
# Data is inlined so this file renders regardless of the Service values file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.Values.name}}-config
  annotations:
    harness.io/skip-versioning: "true"
data:
  APP_MESSAGE: "Hello from Arnold L3.0"
  GREETING_COLOR: "dodgerblue"
  LOG_LEVEL: "info"
