# Four connectors. Create each `connector:` block separately via MCP/UI.
#
# Placeholders to replace:
#   <DOCKERHUB_USER>   your Docker Hub username (also the image namespace)
#   <GIT_ORG_URL>      e.g. https://github.com/your-org
#   <GIT_USER>         your GitHub username
#
# Delegate selectors reference the two delegates already running in your cluster:
#   kubernetes-delegate-linux-ng  -> deploy delegate (namespace harness-delegate-ng)
#   container-build (tag)         -> build delegate (namespace harness-delegate-build)
---
connector:
  name: Docker Hub
  identifier: dockerhub
  type: DockerRegistry
  spec:
    dockerRegistryUrl: https://index.docker.io/v2/
    providerType: DockerHub
    auth:
      type: UsernamePassword
      spec:
        username: <DOCKERHUB_USER>
        passwordRef: dockerhub_pat
    executeOnDelegate: false
---
connector:
  name: GitHub
  identifier: github_connector
  type: Github
  spec:
    url: <GIT_ORG_URL>
    type: Account
    authentication:
      type: Http
      spec:
        type: UsernameToken
        spec:
          username: <GIT_USER>
          tokenRef: github_pat
    apiAccess:
      type: Token
      spec:
        tokenRef: github_pat
    executeOnDelegate: false
---
# Deploy cluster connector (used by the CD stage).
#
# Use ManualConfig when NO delegate runs as a pod inside the target cluster
# (e.g. you only have Docker/host delegates). InheritFromDelegate would fail with
# "KUBERNETES_SERVICE_HOST is not set" / "Did not find the /.kube/config file"
# because there is no in-cluster service account to inherit.
#
# The delegate you pin below must be able to REACH masterUrl over the network.
connector:
  name: K8s Deploy Cluster
  identifier: k8s_connector
  type: K8sCluster
  spec:
    credential:
      type: ManualConfig
      spec:
        masterUrl: <API_SERVER_URL>            # kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}'
        auth:
          type: ServiceAccount
          spec:
            serviceAccountTokenRef: harness_sa_token
            caCertRef: harness_ca_cert          # omit if the API server cert is publicly trusted
    delegateSelectors:
      - <DELEGATE_THAT_CAN_REACH_THE_CLUSTER_API>
---
# ONLY use InheritFromDelegate if a delegate actually runs as a pod INSIDE the
# cluster. If so, pin the selector to that in-cluster delegate:
#
# connector:
#   name: K8s Deploy Cluster (Inherit)
#   identifier: k8s_connector
#   type: K8sCluster
#   spec:
#     credential:
#       type: InheritFromDelegate
#     delegateSelectors:
#       - <IN_CLUSTER_DELEGATE_NAME_OR_TAG>
---
# Build cluster connector (used ONLY if the CI stage uses KubernetesDirect build
# infra). If your build runs on a Docker delegate instead, delete this connector
# and set the CI stage runtime to Cloud or Docker (no K8s connector needed).
# If you DO run build pods in-cluster, pin to the in-cluster delegate here too.
connector:
  name: K8s Build Cluster
  identifier: k8s_build_connector
  type: K8sCluster
  spec:
    credential:
      type: InheritFromDelegate
    delegateSelectors:
      - <IN_CLUSTER_DELEGATE_NAME_OR_TAG>
